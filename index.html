        }
        .option-card {

            position: relative;

            opacity: 0.7;

        let currentQuestionIndex = 0;
        let scores = { N:0, J:0, W:0, Y:0, Q:0, R:0, L:0, S:0 };
        let currentResult = null;

        function startTest() {
            document.getElementById('startPage').classList.add('hidden');
            document.getElementById('questionPage').classList.remove('hidden');
            showQuestion();
        }
        function showQuestion() {
            const q = questions[currentQuestionIndex];
            document.getElementById('questionTitle').textContent = q.title;
            document.getElementById('currentQuestion').textContent = currentQuestionIndex+1;
            document.getElementById('progressText').textContent = `${(currentQuestionIndex+1)*10}%`;
            document.getElementById('progressBar').style.width = `${(currentQuestionIndex+1)*10}%`;
            const opt = document.getElementById('optionsContainer');
            opt.innerHTML = '';
            q.options.forEach(o => {
                const d = document.createElement('div');
                d.className = 'option-card bg-gray-50 border border-gray-200 rounded-xl p-4 cursor-pointer';
                d.textContent = o.text;
                d.onclick = () => selectOption(o.letter, d);
                opt.appendChild(d);
            });
        }
        function selectOption(letter, selectedElement) {
            document.querySelectorAll('.option-card').forEach(card => card.classList.remove('selected'));
            selectedElement.classList.add('selected');
            scores[letter]++;
            currentQuestionIndex++;
            setTimeout(() => currentQuestionIndex < questions.length ? showQuestion() : showResult(), 200);
        }
        function showResult() {
            const code = (scores.N>=scores.J?'N':'J') + (scores.Y>=scores.W?'Y':'W') + (scores.Q>=scores.R?'Q':'R') + (scores.L>=scores.S?'L':'S');
            currentResult = results[code] || results["NWRS"];
            document.getElementById('resultZongzi').src = currentResult.image;
            document.getElementById('resultTitle').textContent = currentResult.title;
            document.getElementById('resultCode').textContent = `本命粽：${currentResult.zongzi}`;
            document.getElementById('resultDesc').textContent = currentResult.desc;
            document.getElementById('resultShare').textContent = currentResult.share;
            document.getElementById('questionPage').classList.add('hidden');
            document.getElementById('resultPage').classList.remove('hidden');
        }
        function restartTest() {
            currentQuestionIndex = 0;
            scores = { N:0, J:0, W:0, Y:0, Q:0, R:0, L:0, S:0 };
            currentResult = null;
            document.getElementById('resultPage').classList.add('hidden');
            document.getElementById('startPage').classList.remove('hidden');
        }
        function generatePoster() {
            if (!currentResult) return;
            document.getElementById('posterZongzi').src = currentResult.image;
            document.getElementById('posterTitle').textContent = currentResult.title;
            document.getElementById('posterCode').textContent = currentResult.zongzi;
            document.getElementById('posterDesc').textContent = currentResult.desc;
            document.getElementById('posterShare').textContent = currentResult.share;
            setTimeout(() => {
                html2canvas(document.getElementById('posterContainer'), {scale:2,useCORS:true,logging:false}).then(canvas => {
                    document.getElementById('posterImage').src = canvas.toDataURL('image/png');
                    document.getElementById('posterModal').style.display = 'flex';
                });
            }, 800);
        }
        function closePosterModal() {
            document.getElementById('posterModal').style.display = 'none';
        }
        function openZongziDetail() {
            if (!currentResult) return;
            document.getElementById('detailZongziImg').src = currentResult.detailImg;
            document.getElementById('detailZongziTitle').textContent = currentResult.zongzi;
            document.getElementById('detailZongziDesc').textContent = currentResult.detailDesc;
            document.getElementById('zongziDetailModal').style.display = 'flex';
        }
        function closeZongziDetail(event) {
            if (event && event.target !== event.currentTarget) return;
            document.getElementById('zongziDetailModal').style.display = 'none';
        }
